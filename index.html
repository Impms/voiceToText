<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Talkback S-1 — Dictation Unit</title>
<meta name="description" content="A speech-to-text dictation unit that runs entirely in your browser." />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#0a0d18" />
<!--
  Deliberately NOT setting apple-mobile-web-app-capable.
  iOS disables microphone / speech recognition for pages launched in
  standalone (fullscreen, no-Safari-chrome) mode — it's an old, unfixed
  WebKit limitation (see webkit.org/b/185448). Leaving this page as a
  regular Safari tab (even when launched from a home screen icon) keeps
  the mic working. See README.md for details.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

* , *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }

body {
  --bg-1: #0a0d18;
  --bg-2: #141a2e;
  --card-bg: rgba(255,255,255,.055);
  --card-border: rgba(255,255,255,.11);
  --panel-bg: rgba(255,255,255,.035);
  --panel-border: rgba(255,255,255,.08);
  --text-hi: #f2f4fa;
  --text-lo: #8b93ab;
  --text-ghost: #5c6480;
  --accent-1: #ff5f7e;
  --accent-2: #ff2f8e;
  --idle-bar: #333c58;

  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 18px 48px;
  background:
    radial-gradient(90% 60% at 15% -10%, rgba(255,60,110,.14) 0%, rgba(255,60,110,0) 55%),
    radial-gradient(80% 55% at 105% 0%, rgba(90,110,255,.14) 0%, rgba(90,110,255,0) 55%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
  font-family: 'Inter', ui-sans-serif, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.du-device {
  width: 100%;
  max-width: 460px;
  min-width: 0;
  border-radius: 28px;
  padding: 22px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.06) inset,
    0 30px 60px -20px rgba(0,0,0,.65);
}

.du-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 2px 2px 20px;
  min-width: 0;
}
.du-brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -.01em;
  color: var(--text-hi);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.du-brand span { font-weight: 500; color: var(--text-lo); }
.du-lamp {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: none;
  padding: 6px 12px 6px 9px;
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-lo);
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
}
.du-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-lo);
  flex: none;
}
.du-dot.on {
  background: var(--accent-1);
  box-shadow: 0 0 0 3px rgba(255,60,110,.22);
  animation: du-pulse 1.4s ease-in-out infinite;
}
@keyframes du-pulse { 50% { opacity: .4; box-shadow: 0 0 0 3px rgba(255,60,110,.06); } }

.du-lcd {
  border-radius: 18px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  overflow: hidden;
  position: relative;
}
.du-strip {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--panel-border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .02em;
  color: var(--text-lo);
  min-width: 0;
}
.du-strip b { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text-hi); margin-left: 5px; }
.du-strip i { font-style: normal; opacity: .7; }
.du-strip .du-spacer { margin-left: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.du-screen {
  height: 230px;
  overflow-y: auto;
  padding: 16px;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-hi);
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
}
.du-screen:focus-visible { outline: none; }
textarea.du-screen {
  width: 100%;
  display: block;
  background: transparent;
  border: 0;
  resize: none;
  font-family: inherit;
  -webkit-appearance: none;
}
textarea.du-screen::placeholder { color: var(--text-ghost); }
.du-alert {
  margin: 0 14px 14px;
  padding: 10px 12px;
  border: 1px solid rgba(255,90,90,.28);
  background: rgba(255,70,70,.1);
  color: #ffb4b0;
  font-size: 12.5px;
  line-height: 1.5;
  border-radius: 10px;
  display: none;
}
.du-alert.show { display: block; }

.du-deck {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 22px 4px 6px;
}
.du-meter { display: flex; flex-direction: column; gap: 9px; min-width: 0; flex: 1; }
.du-bars { display: flex; align-items: flex-end; gap: 3px; height: 28px; }
.du-bar {
  width: 100%;
  border-radius: 2px;
  background: var(--idle-bar);
  opacity: .55;
  transition: opacity .05s linear, background .05s linear;
}
.du-bar.pk { background: linear-gradient(180deg, var(--accent-1), var(--accent-2)); }
.du-cap {
  font-size: 10.5px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-lo);
}

.du-rec {
  flex: none;
  width: 84px; height: 84px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13.5px; font-weight: 600;
  letter-spacing: .04em;
  color: #fff;
  background: linear-gradient(150deg, var(--accent-1) 0%, var(--accent-2) 100%);
  box-shadow: 0 10px 24px -8px rgba(255,45,120,.55);
  transition: transform .08s ease, box-shadow .15s ease;
  position: relative;
}
.du-rec::before {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,80,130,.4);
  opacity: 0;
  transform: scale(.85);
}
.du-rec:active:not(:disabled) { transform: scale(.96); }
.du-rec.live {
  box-shadow: 0 10px 30px -6px rgba(255,45,120,.7);
}
.du-rec.live::before { animation: du-ring 1.6s ease-out infinite; }
@keyframes du-ring {
  0% { opacity: .55; transform: scale(.85); }
  100% { opacity: 0; transform: scale(1.35); }
}
.du-rec:disabled { opacity: .35; cursor: not-allowed; }

.du-keys {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--panel-border);
}
.du-key {
  padding: 10px 16px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,.1);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--text-hi);
  background: rgba(255,255,255,.055);
  transition: background .12s ease, transform .06s ease;
}
.du-key:hover:not(:disabled) { background: rgba(255,255,255,.09); }
.du-key:active:not(:disabled) { transform: scale(.97); }
.du-key:disabled { opacity: .35; cursor: not-allowed; }
.du-key.armed { color: #ff8d8d; border-color: rgba(255,90,90,.35); background: rgba(255,70,70,.1); }
.du-sel { margin-left: auto; display: flex; align-items: center; }
.du-key select {
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--text-hi);
  background: transparent;
  border: 0; cursor: pointer; outline: none;
}
.du-key select option { background: #1a2038; color: var(--text-hi); }
:focus-visible { outline: 2px solid var(--accent-1); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
@media (max-width: 380px) {
  .du-rec { width: 72px; height: 72px; font-size: 12px; }
  .du-screen { height: 200px; }
  .du-device { padding: 18px; border-radius: 24px; }
}
</style>
</head>
<body>

<div class="du-device">
  <div class="du-head">
    <div class="du-brand">Talkback <span>S-1</span></div>
    <div class="du-lamp"><span class="du-dot" id="lamp"></span><span id="lampText">Ready</span></div>
  </div>

  <div class="du-lcd">
    <div class="du-strip">
      <span><i>Time</i><b id="clock">00:00:00</b></span>
      <span><i>Words</i><b id="wordCount">0</b></span>
      <span class="du-spacer"><i>Lang</i><b id="langLabel">EN-US</b></span>
    </div>

    <textarea class="du-screen" id="screen" spellcheck="true"
      placeholder="Press Record and start talking. Your words land here, and you can fix them by typing once you stop."></textarea>

    <div class="du-alert" id="alert"></div>
  </div>

  <div class="du-deck">
    <div class="du-meter">
      <div class="du-bars" id="bars" aria-hidden="true"></div>
      <div class="du-cap">Input level</div>
    </div>
    <button class="du-rec" id="recBtn">Record</button>
  </div>

  <div class="du-keys">
    <button class="du-key" id="copyBtn" disabled>Copy</button>
    <button class="du-key" id="saveBtn" disabled>Save .txt</button>
    <button class="du-key" id="clearBtn" disabled>Clear</button>
    <div class="du-sel">
      <label class="du-key" style="cursor:default">
        <select id="langSelect" aria-label="Recognition language"></select>
      </label>
    </div>
  </div>
</div>

<script>
(function () {
  var LANGS = [
    ["en-US","EN-US"], ["en-GB","EN-GB"], ["es-ES","ES-ES"], ["fr-FR","FR-FR"],
    ["de-DE","DE-DE"], ["it-IT","IT-IT"], ["pt-BR","PT-BR"], ["nl-NL","NL-NL"],
    ["ru-RU","RU-RU"], ["hi-IN","HI-IN"], ["ar-SA","AR-SA"], ["ja-JP","JA-JP"],
    ["ko-KR","KO-KR"], ["zh-CN","ZH-CN"]
  ];
  var BAR_COUNT = 14, PEAK_FROM = 11;

  var screenEl = document.getElementById('screen');
  var alertEl = document.getElementById('alert');
  var lamp = document.getElementById('lamp');
  var lampText = document.getElementById('lampText');
  var clockEl = document.getElementById('clock');
  var wordEl = document.getElementById('wordCount');
  var langLabelEl = document.getElementById('langLabel');
  var recBtn = document.getElementById('recBtn');
  var copyBtn = document.getElementById('copyBtn');
  var saveBtn = document.getElementById('saveBtn');
  var clearBtn = document.getElementById('clearBtn');
  var langSelect = document.getElementById('langSelect');
  var barsWrap = document.getElementById('bars');

  var bars = [];
  for (var i = 0; i < BAR_COUNT; i++) {
    var b = document.createElement('div');
    b.className = 'du-bar' + (i >= PEAK_FROM ? ' pk' : '');
    b.style.height = (9 + i * 1.6) + 'px';
    barsWrap.appendChild(b);
    bars.push(b);
  }

  LANGS.forEach(function (l) {
    var opt = document.createElement('option');
    opt.value = l[0]; opt.textContent = l[1];
    langSelect.appendChild(opt);
  });
  langSelect.value = 'en-US';

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var supported = !!SR;

  var state = {
    listening: false,
    text: '',
    interim: '',
    seconds: 0,
    armed: false,
    lang: 'en-US'
  };
  var rec = null;
  var wantListening = false;
  var timerId = null;
  var audioCtx = null, audioStream = null, raf = null;

  function pad(n) { return String(n).padStart(2, '0'); }

  function renderClock() {
    var s = state.seconds;
    clockEl.textContent = pad(Math.floor(s / 3600)) + ':' + pad(Math.floor(s / 60) % 60) + ':' + pad(s % 60);
  }

  function renderScreen() {
    if (!state.listening) return; // textarea is the source of truth while idle/editable
    var full = state.text + (state.interim ? (state.text ? ' ' : '') + state.interim : '');
    screenEl.value = full;
    screenEl.scrollTop = screenEl.scrollHeight;
  }

  function renderWordCount() {
    var full = (screenEl.value || '').trim();
    wordEl.textContent = full ? full.split(/\s+/).filter(Boolean).length : 0;
  }

  function renderButtons() {
    var hasText = Boolean((screenEl.value || '').trim());
    copyBtn.disabled = !hasText;
    saveBtn.disabled = !hasText;
    clearBtn.disabled = !hasText;
  }

  function showAlert(msg) {
    alertEl.textContent = msg;
    alertEl.classList.add('show');
  }
  function hideAlert() {
    alertEl.classList.remove('show');
    alertEl.textContent = '';
  }

  function stopMeter() {
    if (raf) cancelAnimationFrame(raf);
    if (audioStream) audioStream.getTracks().forEach(function (t) { t.stop(); });
    if (audioCtx && audioCtx.state !== 'closed') audioCtx.close();
    audioCtx = null; audioStream = null; raf = null;
    bars.forEach(function (el) { el.style.opacity = '0.12'; });
  }

  function startMeter() {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
      var src = audioCtx.createMediaStreamSource(stream);
      var analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      src.connect(analyser);
      audioStream = stream;
      var data = new Uint8Array(analyser.fftSize);
      var smooth = 0;
      function tick() {
        analyser.getByteTimeDomainData(data);
        var sum = 0;
        for (var i = 0; i < data.length; i++) {
          var v = (data[i] - 128) / 128;
          sum += v * v;
        }
        var level = Math.min(1, Math.sqrt(sum / data.length) * 3.4);
        smooth = level > smooth ? level : smooth * 0.86 + level * 0.14;
        for (var j = 0; j < bars.length; j++) {
          bars[j].style.opacity = smooth >= (j + 1) / BAR_COUNT ? '1' : '0.12';
        }
        raf = requestAnimationFrame(tick);
      }
      raf = requestAnimationFrame(tick);
    }).catch(function () { /* meter is a nicety only */ });
  }

  function buildRecognition() {
    var r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = state.lang;

    r.onresult = function (e) {
      if (r !== rec) return; // a stale session from a previous take — ignore
      var live = '', settled = '';
      for (var i = e.resultIndex; i < e.results.length; i++) {
        var chunk = e.results[i][0].transcript;
        if (e.results[i].isFinal) settled += chunk;
        else live += chunk;
      }
      if (settled) {
        var prev = state.text;
        var joiner = prev && !/\s$/.test(prev) ? ' ' : '';
        state.text = (prev + joiner + settled.trim()).replace(/\s+([.,!?;:])/g, '$1');
      }
      state.interim = live;
      renderScreen();
      renderWordCount();
      renderButtons();
    };

    r.onerror = function (e) {
      if (r !== rec) return; // a stale session from a previous take — ignore
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        wantListening = false;
        stopListeningUI();
        showAlert("Microphone access is blocked. Allow the mic for this page in your browser's site settings, then press Record again.");
      } else if (e.error === 'network') {
        showAlert('Speech recognition lost its connection. Check your network and press Record again.');
      } else {
        showAlert('Recording stopped: ' + e.error);
      }
    };

    r.onend = function () {
      if (r !== rec) return; // a stale session ending late — must not restart or touch state
      if (wantListening) {
        try { r.start(); } catch (err) { /* already starting */ }
      } else {
        state.interim = '';
        renderScreen();
      }
    };

    return r;
  }

  function stopListeningUI() {
    state.listening = false;
    lamp.classList.remove('on');
    lampText.textContent = 'Ready';
    recBtn.textContent = 'Record';
    recBtn.classList.remove('live');
    screenEl.readOnly = false;
    if (timerId) { clearInterval(timerId); timerId = null; }
    stopMeter();
  }

  function startListeningUI() {
    state.listening = true;
    lamp.classList.add('on');
    lampText.textContent = 'Rec';
    recBtn.textContent = 'Stop';
    recBtn.classList.add('live');
    screenEl.readOnly = true;
    timerId = setInterval(function () {
      state.seconds++;
      renderClock();
    }, 1000);
  }

  function start() {
    if (!supported) return;
    hideAlert();
    state.armed = false;
    clearBtn.classList.remove('armed');
    clearBtn.textContent = 'Clear';
    state.text = (screenEl.value || '').trim();
    state.interim = '';
    rec = buildRecognition();
    wantListening = true;
    try {
      rec.start();
      startListeningUI();
      startMeter();
    } catch (err) {
      showAlert('Could not start the microphone. Close other tabs using it and try again.');
      wantListening = false;
    }
  }

  function stop() {
    wantListening = false;
    if (rec) rec.stop();
    stopListeningUI();
    renderScreen();
  }

  recBtn.addEventListener('click', function () {
    if (state.listening) stop(); else start();
  });

  langSelect.addEventListener('change', function () {
    state.lang = langSelect.value;
    langLabelEl.textContent = langSelect.options[langSelect.selectedIndex].textContent;
    if (wantListening && rec) {
      rec.stop();
      setTimeout(function () {
        if (!wantListening) return;
        rec = buildRecognition();
        try { rec.start(); } catch (err) { /* noop */ }
      }, 180);
    }
  });

  copyBtn.addEventListener('click', function () {
    var text = (screenEl.value || '').trim();
    if (!text) return;
    var done = function () {
      copyBtn.textContent = 'Copied';
      setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1600);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(function () { legacyCopy(text); done(); });
    } else {
      legacyCopy(text); done();
    }
  });
  function legacyCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  saveBtn.addEventListener('click', function () {
    var text = (screenEl.value || '').trim();
    if (!text) return;
    var d = new Date();
    var name = 'dictation-' + d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + '-' + pad(d.getHours()) + pad(d.getMinutes()) + '.txt';
    var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  clearBtn.addEventListener('click', function () {
    if (!state.armed) {
      state.armed = true;
      clearBtn.classList.add('armed');
      clearBtn.textContent = 'Clear?';
      setTimeout(function () {
        state.armed = false;
        clearBtn.classList.remove('armed');
        clearBtn.textContent = 'Clear';
      }, 3000);
      return;
    }
    state.text = '';
    state.interim = '';
    state.seconds = 0;
    state.armed = false;
    screenEl.value = '';
    clearBtn.classList.remove('armed');
    clearBtn.textContent = 'Clear';
    renderClock();
    renderWordCount();
    renderButtons();
    hideAlert();
  });

  screenEl.addEventListener('input', function () {
    if (state.listening) return;
    renderWordCount();
    renderButtons();
  });

  window.addEventListener('beforeunload', function () {
    wantListening = false;
    if (rec) { try { rec.abort(); } catch (e) {} }
    stopMeter();
  });

  if (!supported) {
    recBtn.disabled = true;
    screenEl.placeholder = 'This browser has no speech recognition. Open this page in Safari on iPhone/iPad, or Chrome/Edge on desktop or Android.';
  }

  renderClock();
  renderWordCount();
  renderButtons();
})();
</script>
</body>
</html>
